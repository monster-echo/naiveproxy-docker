version: '3.8'

services:
  # NaiveProxy Client
  naiveproxy:
    image: ${IMAGE_NAME:-rwecho/naiveproxy}:${IMAGE_TAG:-latest}
    container_name: naiveproxy
    restart: unless-stopped
    volumes:
      - ./config:/etc/naive
    ports:
      - "${PORT:-1080}:1080"
    environment:
      - TZ=${TZ:-UTC}

  # Caddy + forward_proxy Server (optional)
  caddy:
    image: ${SERVER_IMAGE_NAME:-rwecho/caddy-forwardproxy}:${SERVER_IMAGE_TAG:-latest}
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy:/etc/caddy
      - ./html:/var/www/html
    profiles:
      - server
